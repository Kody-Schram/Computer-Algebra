name: Build
run-name: Build ${{ github.ref_name }}
on: workflow_dispatch
jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install cmake pkg-config libyaml

      - name: Configure CMake
        run: |
          export PKG_CONFIG_PATH=$(brew --prefix libyaml)/lib/pkgconfig
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build MacOS
        run: cmake --build build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: algebra-${{ runner.os }} # This names it algebra-macOS, algebra-Windows, etc.
          path: build/algebra*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          choco install msys2 -y
          C:\tools\msys64\usr\bin\bash -lc "pacman -Sy --noconfirm mingw-w64-x86_64-libyaml"

      - name: Add MinGW to PATH
        run: echo "C:\tools\msys64\mingw64\bin" >> $GITHUB_PATH
       
      - name: Configure CMake
        run: |
          set PKG_CONFIG_PATH "C:\tools\msys64\mingw64\lib\pkgconfig"
          cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build Windows
        run: cmake --build build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: algebra-${{ runner.os }} # This names it algebra-macOS, algebra-Windows, etc.
          path: build/algebra*

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake libyaml-dev
        
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: algebra-${{ runner.os }} # This names it algebra-macOS, algebra-Windows, etc.
          path: build/algebra*
